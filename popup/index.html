<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity Mapper</title>
  <link rel="stylesheet" href="style/tokens.css">
  <link rel="stylesheet" href="style/base.css">
  <link rel="stylesheet" href="style/layout.css">
  <link rel="stylesheet" href="style/components.css">
  <link rel="stylesheet" href="style/cards.css">
  <link rel="stylesheet" href="style/previews.css">
</head>
<body>
  <div id="app">
    <header class="header-shell">
      <div class="brand-block">
        <div class="logo">
          <div class="logo-box"></div>
          <span>ANTIGRAVITY</span>
        </div>
        <p class="subtitle">Design System Capture</p>
      </div>
      <div class="header-actions">
        <button id="analyze-btn" class="secondary-btn header-ghost-btn" type="button">
          <span>REFRESH</span>
        </button>
        <button id="copy-context-btn" class="primary-btn header-copy-btn" type="button" title="Copy structured prompt for AI coding assistant" disabled>
          <span>COPY AI CONTEXT</span>
          <svg fill="currentColor" viewBox="0 0 24 24" width="18" height="18"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
      </div>
    </header>

    <nav class="tab-nav" aria-label="Design system views">
      <button class="tab-btn is-active" type="button" data-tab="dashboard" aria-selected="true">Dashboard</button>
      <button class="tab-btn" type="button" data-tab="tokens" aria-selected="false">Tokens</button>
      <button class="tab-btn" type="button" data-tab="layout" aria-selected="false">Layout</button>
      <button class="tab-btn" type="button" data-tab="graphics" aria-selected="false">Graphics</button>
    </nav>

    <main class="main">
      <section class="tab-panel is-active" data-panel="dashboard">
        <div id="dashboard-summary" class="summary-grid">
          <div class="status-message">Waiting for capture...</div>
        </div>
        <div id="dashboard-grid" class="content-stack"></div>
      </section>
      <section class="tab-panel" data-panel="tokens">
        <div id="tokens-grid" class="color-grid"></div>
      </section>
      <section class="tab-panel" data-panel="layout">
        <div id="layout-grid" class="color-grid"></div>
      </section>
      <section class="tab-panel" data-panel="graphics">
        <div id="graphics-grid" class="color-grid"></div>
      </section>
    </main>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
