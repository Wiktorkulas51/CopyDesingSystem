<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity Mapper</title>
  <link rel="stylesheet" href="style/tokens.css">
  <link rel="stylesheet" href="style/base.css">
  <link rel="stylesheet" href="style/layout.css">
  <link rel="stylesheet" href="style/navigation.css">
  <link rel="stylesheet" href="style/components.css">
  <link rel="stylesheet" href="style/cards.css">
  <link rel="stylesheet" href="style/media.css">
  <link rel="stylesheet" href="style/previews.css">
</head>
<body>
  <div id="app">
    <header class="header-shell">
      <div class="header-actions">
        <button id="analyze-btn" class="secondary-btn header-ghost-btn" type="button">
          <span>REFRESH</span>
        </button>
        <button id="copy-context-btn" class="primary-btn header-copy-btn" type="button" title="Copy structured prompt for AI coding assistant" disabled>
          <span>COPY AI CONTEXT</span>
          <svg fill="currentColor" viewBox="0 0 24 24" width="18" height="18"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
      </div>
    </header>

    <main class="main">
      <section class="tab-panel is-active" data-panel="overview">
        <div id="dashboard-summary"></div>
        <div id="dashboard-grid" class="content-stack"></div>
      </section>
      <section class="tab-panel" data-panel="media">
        <div id="media-view" class="view-shell"></div>
      </section>
      <section class="tab-panel" data-panel="colors">
        <div id="colors-view" class="view-shell"></div>
      </section>
      <section class="tab-panel" data-panel="fonts">
        <div id="fonts-view" class="view-shell"></div>
      </section>
      <section class="tab-panel" data-panel="history">
        <div id="history-view" class="view-shell"></div>
      </section>
    </main>

    <nav id="bottom-nav" class="bottom-nav" aria-label="Design system views"></nav>
  </div>
  <script src="vendor/jszip.min.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
